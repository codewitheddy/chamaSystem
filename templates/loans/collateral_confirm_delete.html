{% extends 'base.html' %}
{% block title %}Delete Collateral{% endblock %}
{% block page_title %}Delete Collateral{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card border-danger">
            <div class="card-header text-danger">Confirm Delete</div>
            <div class="card-body">
                <p>Delete collateral: <strong>{{ object.description }}</strong> (KES {{ object.estimated_value }})?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url 'loans:detail' object.loan.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
