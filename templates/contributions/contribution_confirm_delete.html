{% extends 'base.html' %}
{% block title %}Delete Contribution{% endblock %}
{% block page_title %}Delete Contribution{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-body text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem;"></i>
                <h5 class="mt-3">Delete this contribution?</h5>
                <p class="text-muted">{{ object.member.name }} - {{ object.get_month_display }} {{ object.year }}</p>
                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'contributions:list' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
