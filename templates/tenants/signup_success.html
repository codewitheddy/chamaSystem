<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chama Created — Chama System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>body{background:#f4f6f9;font-family:'Segoe UI',system-ui,sans-serif;}</style>
</head>
<body>
<div class="min-vh-100 d-flex align-items-center justify-content-center p-4">
    <div style="max-width:480px;width:100%;text-align:center;">
        <div style="font-size:4rem;color:#16a34a;margin-bottom:1rem;">
            <i class="bi bi-check-circle-fill"></i>
        </div>
        <h3 class="fw-bold mb-2">Your chama is ready!</h3>
        <p class="text-muted mb-4">
            <strong>{{ chama.name }}</strong> has been created successfully.
        </p>

        <div class="card p-4 mb-4" style="border:1px solid #e2e8f0;border-radius:12px;text-align:left;">
            <div class="mb-3">
                <div class="text-muted small fw-semibold mb-1">Your chama URL</div>
                <code style="font-size:.95rem;color:#2563eb;">{{ redirect_url }}</code>
            </div>
            <div>
                <div class="text-muted small fw-semibold mb-1">Your login username</div>
                <code style="font-size:.95rem;">{{ username }}</code>
            </div>
        </div>

        <p class="text-muted small mb-4">
            Save these details. You'll use them to log in to your chama dashboard.
        </p>

        <a href="{{ redirect_url }}" class="btn btn-primary btn-lg w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i>Go to My Chama
        </a>
    </div>
</div>
</body>
</html>
