<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block print_title %}Report{% endblock %} — Chama System</title>
<style>
  body{font-family:Arial,sans-serif;font-size:12px;color:#1e293b;margin:24px;}
  h2{margin:0 0 4px;}
  .meta{color:#64748b;font-size:11px;margin-bottom:16px;}
  table{width:100%;border-collapse:collapse;margin-top:8px;}
  th{background:#1e2a3a;color:#fff;padding:6px 8px;text-align:left;font-size:11px;white-space:nowrap;}
  td{padding:5px 8px;border-bottom:1px solid #e2e8f0;vertical-align:top;}
  tfoot td{font-weight:bold;background:#f8fafc;border-top:2px solid #1e2a3a;}
  tr:nth-child(even) td{background:#f8fafc;}
  .no-print{margin-bottom:12px;}
  .badge-green{background:#f0fdf4;color:#16a34a;padding:2px 6px;border-radius:4px;font-size:10px;}
  .badge-red{background:#fff1f2;color:#e11d48;padding:2px 6px;border-radius:4px;font-size:10px;}
  .badge-amber{background:#fffbeb;color:#d97706;padding:2px 6px;border-radius:4px;font-size:10px;}
  .badge-gray{background:#f1f5f9;color:#475569;padding:2px 6px;border-radius:4px;font-size:10px;}
  .footer{margin-top:24px;color:#94a3b8;font-size:10px;border-top:1px solid #e2e8f0;padding-top:8px;}
  @media print{.no-print{display:none!important;}}
</style>
</head>
<body>
<div class="no-print">
  <button onclick="window.print()" style="padding:6px 16px;background:#2563eb;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-right:8px;">
    <span>&#128438;</span> Print / Save PDF
  </button>
  <button onclick="window.close()" style="padding:6px 16px;background:#f1f5f9;color:#334155;border:1px solid #e2e8f0;border-radius:4px;cursor:pointer;">
    Close
  </button>
</div>

<h2>{% block print_heading %}{% endblock %}</h2>
<div class="meta">{% block print_meta %}{% endblock %}</div>

{% block print_body %}{% endblock %}

<div class="footer">Generated by Chama System &mdash; {% now "d M Y H:i" %}</div>
</body>
</html>
