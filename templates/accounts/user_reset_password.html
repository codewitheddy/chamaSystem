{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block page_title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card">
      <div class="card-header"><i class="bi bi-key me-2"></i>Reset Password — {{ target_user.username }}</div>
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold small">New Password <span class="text-danger">*</span></label>
            <input type="password" name="password1" class="form-control" required minlength="8">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold small">Confirm Password <span class="text-danger">*</span></label>
            <input type="password" name="password2" class="form-control" required minlength="8">
          </div>
          {% if error %}<div class="alert alert-danger py-2 small">{{ error }}</div>{% endif %}
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">Set Password</button>
            <a href="{% url 'accounts:users' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
